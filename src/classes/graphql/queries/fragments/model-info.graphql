fragment model_info on modelcatalog_configuration {
    id
    label
    description
    has_component_location
    has_software_image
    model_configuration_id
    inputs {
        input {
            id
            label
            has_format
            position
            description
        }
    }
    outputs {
        output {
            id
            label
            has_format
            description
        }
    }
    parameters {
        parameter {
            id
            label
            description
            has_default_value
            has_fixed_value
            has_minimum_accepted_value
            has_maximum_accepted_value
            parameter_type
            position
            has_accepted_values
            has_data_type
        }
    }
}
